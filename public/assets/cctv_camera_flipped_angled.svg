    <line x1="188" y1="148" x2="40" y2="210" stroke="#60e098" stroke-width="1" opacity="0.35" style="fill:rgb(0, 0, 0);stroke:rgb(96, 224, 152);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M70,72 Q32,133 70,194" fill="none" stroke="#60e098" stroke-width="1" opacity="0.2" stroke-dasharray="5,3" style="fill:none;stroke:rgb(96, 224, 152);color:rgb(255, 255, 255);stroke-width:1px;stroke-dasharray:5px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.2;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

