    <rect x="260" y="88" width="200" height="90" rx="14" fill="none" stroke="#60e098" stroke-width="1.5" style="fill:none;stroke:rgb(96, 224, 152);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

