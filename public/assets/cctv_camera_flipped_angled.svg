    <circle cx="436" cy="133" r="11" fill="none" stroke="#60e098" stroke-width="1" opacity="0.4" style="fill:none;stroke:rgb(96, 224, 152);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

