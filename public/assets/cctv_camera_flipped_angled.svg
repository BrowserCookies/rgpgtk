    <line x1="302" y1="102" x2="302" y2="174" stroke="#60e098" stroke-width="1" opacity="0.3" style="fill:rgb(0, 0, 0);stroke:rgb(96, 224, 152);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="314" y1="102" x2="314" y2="174" stroke="#60e098" stroke-width="1" opacity="0.3" style="fill:rgb(0, 0, 0);stroke:rgb(96, 224, 152);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

