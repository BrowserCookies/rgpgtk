    <!-- Soft FOV -->
    <line x1="196" y1="122" x2="54" y2="70" stroke="#60e098" stroke-width="0.8" opacity="0.2" style="fill:rgb(0, 0, 0);stroke:rgb(96, 224, 152);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.2;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="196" y1="148" x2="54" y2="200" stroke="#60e098" stroke-width="0.8" opacity="0.2" style="fill:rgb(0, 0, 0);stroke:rgb(96, 224, 152);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.2;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M78,80 Q44,135 78,190" fill="none" stroke="#60e098" stroke-width="0.8" opacity="0.15" stroke-dasharray="5,4" style="fill:none;stroke:rgb(96, 224, 152);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-dasharray:5px, 4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.15;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  </g>

</svg>